name: Bug Report
description: Something broke on real hardware
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing. Please fill this out so we can repro.
  - type: input
    id: gpu
    attributes:
      label: GPU Model
      placeholder: H100 80GB PCIe, H200 141GB SXM, etc
    validations:
      required: true
  - type: input
    id: driver
    attributes:
      label: Driver + CUDA Version
      placeholder: 550.54.14, CUDA 12.4
    validations:
      required: true
  - type: input
    id: vllm
    attributes:
      label: vLLM Version
      placeholder: v0.4.3
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you run, what did you expect, what actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs from thermal-ctrl-harness and nvidia-smi dmon
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I ran with `SIMULATE_THERMAL=1` first to confirm the demo works
          required: false
        - label: I checked VALIDATION.md
          required: true
